<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>安全中心 - 五六影院</title>
    <style>
        body { background-color: #0c0c0e; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; box-sizing: border-box; }
        .container { padding: 40px 24px; text-align: center; width: 92%; max-width: 380px; background: #16161a; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #282830; box-sizing: border-box; }
        .brand { font-size: 26px; font-weight: bold; color: #ff4d4f; margin-bottom: 5px; letter-spacing: 2px; }
        .sub-brand { font-size: 12px; color: #666; margin-bottom: 25px; letter-spacing: 1px; }
        .icon { font-size: 40px; margin-bottom: 15px; }
        h3 { margin: 0 0 15px 0; font-size: 18px; font-weight: 600; color: #fff; }
        .tips-box { margin: 0 0 20px 0; font-size: 14px; color: #aaa; line-height: 1.6; text-align: left; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; border-left: 4px solid #ff4d4f; }
        .copy-zone { border-top: 1px dashed #282830; padding-top: 20px; margin-top: 15px; }
        .url-display { background: #202026; border: 1px solid #32323d; padding: 12px; border-radius: 8px; font-size: 14px; color: #eee; margin-bottom: 12px; word-break: break-all; text-align: center; line-height: 1.4; }
        .copy-btn { width: 100%; background: #ff4d4f; color: #fff; border: none; padding: 13px; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(255, 77, 79, 0.2); }
        .success-tips { font-size: 13px; color: #52c41a; margin-top: 8px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div class="brand">🍿 五六影院</div>
        <div class="sub-brand">56YY.COM · 极速蓝光原画</div>
        <div class="icon">⚠️</div>
        <h3>当前环境内核受限</h3>
        <p class="tips-box">
            因当前内置浏览器强行拦截截流，暂无法直接解码。请点击下方按钮一键复制原视频网址，前往手机自带浏览器粘贴打开即可观看。
        </p>
        <div class="copy-zone">
            <div class="url-display" id="display-url">加载中...</div>
            <button class="copy-btn" onclick="doCopyAction()">📋 一键复制原视频网址</button>
            <div class="success-tips" id="success-msg">✅ 复制成功！请打开自带浏览器粘贴访问</div>
        </div>
    </div>

<script>
    // ⚠️ 这里换成你五六影院的真实主站域名（最后不要加斜杠）
    var MAIN_DOMAIN = "https://56yy.com"; 

    function getRealVideoUrl() {
        var params = new URLSearchParams(window.location.search);
        var backUrl = params.get('backurl') || "";
        
        // 过滤掉头条强行注入的流氓加载ID参数，保护播放页干净
        if (backUrl.indexOf('?') > -1) {
            backUrl = backUrl.split('?')[0];
        }
        
        if (!backUrl || backUrl === "null" || backUrl === "/") {
            return MAIN_DOMAIN;
        }
        return MAIN_DOMAIN + backUrl;
    }

    var finalUrl = getRealVideoUrl();
    document.getElementById('display-url').innerText = finalUrl;

    function doCopyAction() {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(finalUrl).then(showSuccess).catch(fallbackCopy);
        } else {
            fallbackCopy();
        }
        function fallbackCopy() {
            var textArea = document.createElement("textarea");
            textArea.value = finalUrl;
            textArea.style.position = "fixed"; textArea.style.opacity = "0";
            document.body.appendChild(textArea);
            textArea.focus(); textArea.select();
            try {
                document.execCommand('copy');
                showSuccess();
            } catch (err) {
                alert('复制失败，请手动长按上方框内网址复制');
            }
            document.body.removeChild(textArea);
        }
        function showSuccess() {
            var msg = document.getElementById('success-msg');
            msg.style.display = 'block';
            setTimeout(function() { msg.style.display = 'none'; }, 3000);
        }
    }
</script>
</body>
</html>
